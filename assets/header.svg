<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#0a0e1a"/>
      <stop offset="70%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#1a1b2e"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#70a5fd"/>
      <stop offset="50%" style="stop-color:#bf91f3"/>
      <stop offset="100%" style="stop-color:#70a5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1a1b2e" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="56" x2="900" y2="56"/>
    <line x1="0" y1="112" x2="900" y2="112"/>
    <line x1="0" y1="168" x2="900" y2="168"/>
    <line x1="0" y1="224" x2="900" y2="224"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
  </g>

  <!-- Decorative orbs -->
  <circle cx="80" cy="60" r="90" fill="#70a5fd" opacity="0.04"/>
  <circle cx="820" cy="220" r="110" fill="#bf91f3" opacity="0.04"/>
  <circle cx="450" cy="140" r="140" fill="#38bdae" opacity="0.02"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#textGlow)" opacity="0.8"/>

  <!-- Corner brackets -->
  <g stroke="#70a5fd" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="20,15 20,5 30,5"/>
    <polyline points="870,5 880,5 880,15"/>
    <polyline points="20,265 20,275 30,275"/>
    <polyline points="870,275 880,275 880,265"/>
  </g>

  <!-- Floating code dots -->
  <g fill="#70a5fd" opacity="0.3">
    <circle cx="50" cy="140" r="2"/>
    <circle cx="60" cy="155" r="1.5"/>
    <circle cx="845" cy="100" r="2"/>
    <circle cx="858" cy="115" r="1.5"/>
    <circle cx="150" cy="230" r="1.5"/>
    <circle cx="760" cy="50" r="1.5"/>
  </g>

  <!-- Main name -->
  <text x="450" y="118" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-weight="700" font-size="68" fill="url(#textGlow)" filter="url(#glow)" letter-spacing="4">
    ADITYA KUMAR
  </text>

  <!-- Subtitle line -->
  <text x="450" y="155" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-weight="400" font-size="14" fill="#a9b1d6" letter-spacing="6">
    FULL STACK DEVELOPER  •  AI/ML ENGINEER  •  CLOUD ARCHITECT
  </text>

  <!-- Decorative line under subtitle -->
  <line x1="200" y1="168" x2="700" y2="168" stroke="url(#textGlow)" stroke-width="0.5" opacity="0.4"/>

  <!-- Tag line -->
  <text x="450" y="195" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#38bdae" opacity="0.8" letter-spacing="2">
    &#47;&#47;  RAG  |  LLMs  |  LangChain  |  Real-time Apps  |  Open Source
  </text>

  <!-- Bottom status bar -->
  <rect x="0" y="252" width="900" height="28" fill="#0a0e1a" opacity="0.8"/>
  <text x="20" y="270" font-family="'Courier New', Courier, monospace" font-size="11" fill="#70a5fd" opacity="0.7">
    ● ONLINE
  </text>
  <text x="110" y="270" font-family="'Courier New', Courier, monospace" font-size="11" fill="#a9b1d6" opacity="0.5">
    Pune, India  |  CF: 1352  |  AWS Certified  |  Open to opportunities
  </text>
  <text x="750" y="270" font-family="'Courier New', Courier, monospace" font-size="11" fill="#bf91f3" opacity="0.7">
    adityak23.vercel.app
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="278" width="900" height="2" fill="url(#textGlow)" opacity="0.6"/>
</svg>
